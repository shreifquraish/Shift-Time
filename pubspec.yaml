name: shift_time
description: "تطبيق لتتبع ساعات العمل وحساب الأرباح"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  flutter_bloc: ^8.1.6
  hive_flutter: ^1.1.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # أداة توليد الأيقونات تلقائياً
  flutter_launcher_icons: ^0.13.1

# إعدادات الأيقونة للاندرويد والـ iOS
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  remove_alpha_ios: true # خطوة مهمة جداً للـ iOS تمنع ظهور خلفية سوداء للأيقونة في أبل